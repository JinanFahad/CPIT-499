<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>المستشار الذكي — مقدّم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0b0d12;
      --surface:   #13161f;
      --card:      #181c28;
      --border:    #222736;
      --border2:   #2a3045;
      --accent:    #4f8ef7;
      --accent-dim:#1e3460;
      --accent2:   #22d3a5;
      --gold:      #f4c430;
      --danger:    #f7614f;
      --text:      #e2e6f0;
      --muted:     #5a6178;
      --muted2:    #8892aa;
      --user-bg:   #1a2540;
      --ai-bg:     #13161f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ══ LAYOUT ══════════════════════════════════════ */
    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      grid-template-rows: 60px 1fr;
      height: 100vh;
    }

    /* ══ TOPBAR ══════════════════════════════════════ */
    .topbar {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: relative;
      z-index: 10;
    }

    .topbar .logo {
      font-size: 19px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-left: auto;
    }

    .topbar .page-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar .page-title .icon {
      width: 28px; height: 28px;
      background: var(--accent-dim);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted2);
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ══ SIDEBAR ══════════════════════════════════════ */
    .sidebar {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* Report Selector */
    .report-selector {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .report-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }
    .report-card:hover { border-color: var(--border2); }
    .report-card.active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .report-card .r-name {
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .report-card .r-meta {
      font-size: 11px;
      color: var(--muted2);
      margin-top: 3px;
      display: flex;
      gap: 8px;
    }
    .report-card .r-badge {
      position: absolute;
      top: 8px;
      left: 10px;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 700;
    }

    .no-reports {
      text-align: center;
      padding: 20px 10px;
      color: var(--muted);
      font-size: 12px;
    }

    /* Quick Suggestions */
    .suggestions-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .suggestions-list::-webkit-scrollbar { width: 3px; }
    .suggestions-list::-webkit-scrollbar-thumb { background: var(--border); }

    .suggestion-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: right;
      font-family: 'Cairo', sans-serif;
      font-size: 12.5px;
      color: var(--muted2);
      cursor: pointer;
      transition: all .2s;
      line-height: 1.5;
    }
    .suggestion-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-dim);
    }

    /* Reset btn */
    .reset-btn {
      margin: 12px 16px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .reset-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* ══ CHAT AREA ══════════════════════════════════ */
    .chat-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      position: relative;
    }

    /* subtle grid bg */
    .chat-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.15;
      pointer-events: none;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* Welcome state */
    .welcome-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }
    .welcome-state .avatar {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent-dim), #0d1830);
      border: 2px solid var(--accent);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 40px rgba(79,142,247,.2);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .welcome-state h2 {
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
    }
    .welcome-state p {
      font-size: 13px;
      color: var(--muted2);
      max-width: 340px;
      line-height: 1.7;
    }
    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .welcome-chip {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 12px;
      color: var(--muted2);
      cursor: pointer;
      transition: all .2s;
      font-family: 'Cairo', sans-serif;
    }
    .welcome-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Message bubbles */
    .msg {
      display: flex;
      gap: 12px;
      max-width: 780px;
      animation: msgIn .25s ease-out;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .msg-avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.user .msg-avatar {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
    }
    .msg.assistant .msg-avatar {
      background: linear-gradient(135deg, #1e2d4a, #131828);
      border: 1px solid var(--border2);
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.75;
    }
    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid rgba(79,142,247,.3);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .msg.assistant .msg-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border2);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      padding: 0 4px;
    }
    .msg.user .msg-time { text-align: left; }

    /* typing indicator */
    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
      background: var(--ai-bg);
      border: 1px solid var(--border2);
      border-radius: 14px;
      border-bottom-right-radius: 4px;
      width: fit-content;
    }
    .typing-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); opacity:.4; }
      30% { transform: translateY(-6px); opacity:1; }
    }

    /* ══ INPUT BAR ══════════════════════════════════ */
    .input-bar {
      padding: 16px 32px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      position: relative;
      z-index: 2;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 10px 10px 10px 14px;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: var(--accent); }

    #msgInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Cairo', sans-serif;
      font-size: 13.5px;
      color: var(--text);
      resize: none;
      min-height: 22px;
      max-height: 120px;
      line-height: 1.6;
    }
    #msgInput::placeholder { color: var(--muted); }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { background: #3a7ae8; transform: scale(1.05); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: center;
    }

    /* ══ STATUS INDICATOR ══════════════════════════ */
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted2);
    }

    /* ══ SCROLLBAR ══════════════════════════════════ */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  </style>
</head>
<body>
<div class="app">

  <!-- ── TOPBAR ── -->
  <div class="topbar">
    <a href="/" class="back-btn">← رجوع</a>

    <div class="page-title">
      <div class="icon">🤖</div>
      المستشار الذكي
    </div>

    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">جاهز</span>
    </div>

    <div class="logo">مقدّم</div>
  </div>

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">

    <!-- Report Selector -->
    <div class="sidebar-section">
      <div class="sidebar-label">دراسة الجدوى</div>
      <div class="report-selector" id="reportSelector">
        <div class="no-reports" id="noReports">
          <div style="font-size:24px;margin-bottom:8px">📂</div>
          لا توجد دراسات محفوظة
        </div>
      </div>
    </div>

    <!-- Quick Suggestions label -->
    <div style="padding:12px 16px 0">
      <div class="sidebar-label">أسئلة مقترحة</div>
    </div>

    <!-- Suggestions -->
    <div class="suggestions-list" id="suggestionsList">
      <!-- تُملأ ديناميكيًا -->
    </div>

    <button class="reset-btn" onclick="resetSession()">
      🔄 بداية محادثة جديدة
    </button>

  </div>

  <!-- ── CHAT AREA ── -->
  <div class="chat-area">

    <!-- Messages -->
    <div class="messages" id="messages">
      <!-- Welcome State -->
      <div class="welcome-state" id="welcomeState">
        <div class="avatar">🤖</div>
        <h2>مرحبًا، أنا مقدِّم</h2>
        <p>مستشارك الذكي لدراسات الجدوى. اختر دراسة الجدوى من القائمة، أو ابدأ بسؤالك مباشرةً.</p>
        <div class="welcome-chips" id="welcomeChips">
          <button class="welcome-chip" onclick="sendSuggestion('📊 لخّص لي دراسة الجدوى')">📊 ملخص الدراسة</button>
          <button class="welcome-chip" onclick="sendSuggestion('💰 اشرح لي هامش الربح')">💰 هامش الربح</button>
          <button class="welcome-chip" onclick="sendSuggestion('⚠️ ما هي أكبر المخاطر؟')">⚠️ المخاطر</button>
          <button class="welcome-chip" onclick="sendSuggestion('⏱️ متى سأسترد رأس المال؟')">⏱️ الاسترداد</button>
        </div>
      </div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
      <div class="input-row">
        <textarea
          id="msgInput"
          placeholder="اكتب سؤالك هنا..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-hint">Enter للإرسال · Shift+Enter لسطر جديد</div>
    </div>

  </div>
</div>

<script>
  // ══════════════════════════════════════════
  // State
  // ══════════════════════════════════════════
  let sessionId = generateId();
  let activeReport = null;       // بيانات دراسة الجدوى المختارة
  let contextSent = false;       // هل أُرسل الـ context في هذه السيشن؟
  let isLoading = false;

  // بيانات مؤقتة — في المستقبل ستُجلب من SQLite
  // حاليًا نقرأها من localStorage كمثال (أو يمكنك تمريرها من الـ backend)
  const MOCK_REPORTS = loadReportsFromStorage();

  // ══════════════════════════════════════════
  // Init
  // ══════════════════════════════════════════
  window.addEventListener('DOMContentLoaded', () => {
    renderReportList();
    renderSuggestions(null);
  });

  // ══════════════════════════════════════════
  // Reports
  // ══════════════════════════════════════════
  function loadReportsFromStorage() {
    // تقرأ من localStorage مؤقتًا
    // عندما تضيف SQLite، استبدل هذا بـ fetch('/api/reports')
    try {
      const raw = localStorage.getItem('muqaddim_reports');
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function renderReportList() {
    const container = document.getElementById('reportSelector');
    const noReports = document.getElementById('noReports');

    if (!MOCK_REPORTS.length) {
      noReports.style.display = 'block';
      return;
    }

    noReports.style.display = 'none';
    container.innerHTML = '';

    MOCK_REPORTS.forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'report-card';
      card.innerHTML = `
        <div class="r-name">${r.name || r.business_type || 'دراسة جدوى'}</div>
        <div class="r-meta">
          <span>${r.city || ''}</span>
          <span>${formatDate(r.created_at)}</span>
        </div>
        <div class="r-badge">#${i + 1}</div>
      `;
      card.onclick = () => selectReport(card, r);
      container.appendChild(card);
    });
  }

  function selectReport(el, report) {
    document.querySelectorAll('.report-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeReport = report;
    contextSent = false; // سنعيد إرسال الـ context في أول رسالة
    renderSuggestions(report);

    // رسالة تأكيد في الشات
    addSystemNote(`تم اختيار: ${report.name || report.business_type || 'دراسة الجدوى'} — جاهز للأسئلة`);
  }

  // ══════════════════════════════════════════
  // Suggestions
  // ══════════════════════════════════════════
  function renderSuggestions(report) {
    const list = document.getElementById('suggestionsList');
    const base = [
      '📊 لخّص لي دراسة الجدوى هذي',
      '💰 اشرح لي هامش الربح وهل هو جيد؟',
      '⚠️ ما هي أكبر المخاطر في هذا المشروع؟',
      '📈 كيف أحسّن الربحية؟',
      '⏱️ متى سأسترد رأس المال؟',
    ];

    if (report?.business_type) base.unshift(`🏢 حلّل لي وضع ${report.business_type} في السوق`);

    list.innerHTML = base.slice(0, 5).map(s => `
      <button class="suggestion-btn" onclick="sendSuggestion('${s.replace(/'/g, "\\'")}')">
        ${s}
      </button>
    `).join('');
  }

  function sendSuggestion(text) {
    document.getElementById('msgInput').value = text;
    sendMessage();
  }

  // ══════════════════════════════════════════
  // Chat
  // ══════════════════════════════════════════
  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    // hide welcome
    const welcome = document.getElementById('welcomeState');
    if (welcome) welcome.remove();

    // add user bubble
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    // show typing
    const typingId = showTyping();
    setLoading(true);

    try {
      const body = {
        session_id: sessionId,
        message: text,
      };

      // أرسل الـ context مرة واحدة فقط
      if (!contextSent && activeReport) {
        body.report_context = activeReport;
        contextSent = true;
      }

      const res = await fetch('/api/consultant/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json();

      removeTyping(typingId);

      if (data.error) {
        addMessage('assistant', `❌ خطأ: ${data.error}`);
      } else {
        addMessage('assistant', data.reply);
      }
    } catch (err) {
      removeTyping(typingId);
      addMessage('assistant', `❌ تعذّر الاتصال بالسيرفر: ${err.message}`);
    } finally {
      setLoading(false);
    }
  }

  function addMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
    const avatar = role === 'user' ? '👤' : '🤖';
    const formattedText = formatText(text);

    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-body">
        <div class="msg-bubble">${formattedText}</div>
        <div class="msg-time">${time}</div>
      </div>
    `;

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function addSystemNote(text) {
    const container = document.getElementById('messages');
    // remove welcome if exists
    const welcome = document.getElementById('welcomeState');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.style.cssText = 'text-align:center;font-size:11px;color:var(--muted);padding:4px;';
    div.textContent = `— ${text} —`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const id = 'typing-' + Date.now();
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.id = id;
    div.className = 'msg assistant';
    div.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="msg-body">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    document.getElementById(id)?.remove();
  }

  // ══════════════════════════════════════════
  // Helpers
  // ══════════════════════════════════════════
  function formatText(text) {
    // تحويل ** bold ** و줄바꿈
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function setLoading(val) {
    isLoading = val;
    document.getElementById('sendBtn').disabled = val;
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (val) {
      dot.style.background = 'var(--gold)';
      txt.textContent = 'يفكّر...';
    } else {
      dot.style.background = 'var(--accent2)';
      txt.textContent = 'جاهز';
    }
  }

  function resetSession() {
    // مسح السيشن من السيرفر
    fetch('/api/consultant/clear', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });

    // إعادة ضبط
    sessionId = generateId();
    contextSent = false;
    activeReport = null;

    // مسح الرسائل وإظهار الـ welcome
    const container = document.getElementById('messages');
    container.innerHTML = `
      <div class="welcome-state" id="welcomeState">
        <div class="avatar">🤖</div>
        <h2>محادثة جديدة</h2>
        <p>اختر دراسة جدوى من القائمة أو ابدأ بسؤالك.</p>
        <div class="welcome-chips">
          <button class="welcome-chip" onclick="sendSuggestion('📊 لخّص لي دراسة الجدوى')">📊 ملخص الدراسة</button>
          <button class="welcome-chip" onclick="sendSuggestion('💰 اشرح لي هامش الربح')">💰 هامش الربح</button>
          <button class="welcome-chip" onclick="sendSuggestion('⚠️ ما هي أكبر المخاطر؟')">⚠️ المخاطر</button>
        </div>
      </div>`;

    // إزالة active من الكاردات
    document.querySelectorAll('.report-card').forEach(c => c.classList.remove('active'));
  }

  function generateId() {
    return 'sess_' + Math.random().toString(36).slice(2, 11) + '_' + Date.now();
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      return new Date(dateStr).toLocaleDateString('ar-SA', { month: 'short', day: 'numeric' });
    } catch { return ''; }
  }
</script>
</body>
</html>
